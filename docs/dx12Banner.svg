<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">dx12 banner</title>
  <desc id="desc">DirectX 12 wrapper for Nim on Windows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="320" fill="url(#bg)"/>
  <g fill="#ffffff" font-family="Arial, Helvetica, sans-serif">
    <text x="64" y="132" font-size="84" font-weight="700">dx12</text>
    <text x="64" y="192" font-size="28">DirectX 12 wrapper for Nim on Windows.</text>
    <text x="64" y="242" font-size="22" opacity="0.9">Thin Win32/DXGI/D3D12 bindings with examples and context helpers.</text>
  </g>
</svg>
