name: Github Actions
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: treeform/setup-nim-action@v6
      - run: nimby install -g windy
      - run: nim check src/dx12.nim
      - run: nim check tests/tests.nim
      - run: nim r tests/tests.nim
