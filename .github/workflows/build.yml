name: Github Actions
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: treeform/setup-nim-action@v6
      - run: nimby install -g
      - run: nim check src/dx12.nim
      - run: nim r tests/tests.nim
      - run: nimby install -g windy
      - run: nimby install -g pixie
      - run: nimby install -g vmath
      - run: nim c examples/basic_screen.nim
      - run: nim c examples/basic_triangle.nim
      - run: nim c examples/shader_triangle.nim
      - run: nim c examples/basic_quad.nim
      - run: nim c examples/basic_cube.nim
      - run: nim c examples/sprite_sheet.nim
      - run: nim c examples/viewer_obj.nim
